name: 🤖 Auto Build APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug/release)'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

env:
  JAVA_VERSION: '17'
  ANDROID_COMPILE_SDK: '34'
  ANDROID_BUILD_TOOLS: '34.0.0'

jobs:
  # ──────────────────────────────────────────────
  #  1. GENERATE ICONS FROM URL
  # ──────────────────────────────────────────────
  generate-icons:
    name: 🎨 Generate Icons
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Pillow
        run: pip install Pillow

      - name: Generate launcher icons
        run: python3 generate_icons.py

      - name: Upload icons as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-icons
          path: app/src/main/res/mipmap-*
          retention-days: 1

  # ──────────────────────────────────────────────
  #  2. BUILD DEBUG APK
  # ──────────────────────────────────────────────
  build-debug:
    name: 🔧 Build Debug APK
    runs-on: ubuntu-latest
    needs: generate-icons
    if: github.event.inputs.build_type != 'release'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download icons
        uses: actions/download-artifact@v4
        with:
          name: app-icons
          path: app/src/main/res/

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

  # ──────────────────────────────────────────────
  #  3. BUILD RELEASE APK (signed)
  # ──────────────────────────────────────────────
  build-release:
    name: 🚀 Build Signed Release APK
    runs-on: ubuntu-latest
    needs: generate-icons
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.event.inputs.build_type == 'release' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download icons
        uses: actions/download-artifact@v4
        with:
          name: app-icons
          path: app/src/main/res/

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Decode Keystore
        if: secrets.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
          echo "KEYSTORE_PATH=keystore.jks" >> $GITHUB_ENV

      - name: Generate debug keystore if no signing secrets
        if: env.KEYSTORE_PATH == ''
        run: |
          keytool -genkeypair -v \
            -keystore app/keystore.jks \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -alias release \
            -dname "CN=JHTone, OU=Dev, O=WebToApp, L=BD, S=Dhaka, C=BD" \
            -storepass password123 \
            -keypass password123
          echo "KEYSTORE_PATH=keystore.jks" >> $GITHUB_ENV
          echo "KEY_STORE_PASSWORD=password123" >> $GITHUB_ENV
          echo "KEY_ALIAS=release" >> $GITHUB_ENV
          echo "KEY_PASSWORD=password123" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD || env.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS || env.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || env.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Get APK info
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          APK_SIZE=$(du -sh "$APK_PATH" | cut -f1)
          echo "APK_PATH=$APK_PATH" >> $GITHUB_ENV
          echo "APK_SIZE=$APK_SIZE" >> $GITHUB_ENV
          echo "📦 APK Size: $APK_SIZE"

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
          body: |
            ## 📱 JH Tone App ${{ github.ref_name }}

            ### 🔗 Web URL
            https://jh.auth.jhtone.site/

            ### ✨ Features
            - ⚡ Fast WebView with hardware acceleration
            - 🔄 Pull-to-refresh support
            - 📶 Offline error page
            - 🎨 Beautiful splash screen
            - 🔙 Back navigation support
            - 📱 Fullscreen immersive mode

            ### 📦 APK Size
            ${{ env.APK_SIZE }}

            ### 📲 Installation
            Download the `.apk` file and enable "Install from unknown sources" in your Android settings.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  #  4. BUILD SUMMARY
  # ──────────────────────────────────────────────
  summary:
    name: 📊 Build Summary
    runs-on: ubuntu-latest
    needs: [build-release]
    if: always()

    steps:
      - name: Build Summary
        run: |
          echo "## 📱 JH Tone APK Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 Web URL | https://jh.auth.jhtone.site/ |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏷️ Trigger | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌿 Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📅 Date | $(date '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Build completed! Download APK from the **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
