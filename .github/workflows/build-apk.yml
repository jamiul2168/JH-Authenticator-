name: 🤖 Auto Build APK

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug/release)'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

env:
  JAVA_VERSION: '17'

jobs:
  generate-icons:
    name: 🎨 Generate Icons
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install Pillow
      - run: python3 generate_icons.py
      - uses: actions/upload-artifact@v4
        with:
          name: app-icons
          path: app/src/main/res/mipmap-*
          retention-days: 1

  build-release:
    name: 🚀 Build Signed Release APK
    runs-on: ubuntu-latest
    needs: generate-icons

    steps:
      - uses: actions/checkout@v4

      - name: Download icons
        uses: actions/download-artifact@v4
        with:
          name: app-icons
          path: app/src/main/res/

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: gradle

      - name: Generate keystore if no secrets
        run: |
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            keytool -genkeypair -v \
              -keystore app/keystore.jks \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -alias release \
              -dname "CN=JHTone, OU=Dev, O=WebToApp, L=BD, S=Dhaka, C=BD" \
              -storepass password123 \
              -keypass password123
            echo "KEY_STORE_PASSWORD=password123" >> $GITHUB_ENV
            echo "KEY_ALIAS=release" >> $GITHUB_ENV
            echo "KEY_PASSWORD=password123" >> $GITHUB_ENV
          else
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks
            echo "KEY_STORE_PASSWORD=${{ secrets.KEY_STORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          fi
          echo "KEYSTORE_PATH=keystore.jks" >> $GITHUB_ENV

      - name: Grant gradlew permission
        run: chmod +x gradlew

      - name: Build Release APK
        env:
          KEYSTORE_PATH: ${{ env.KEYSTORE_PATH }}
          KEY_STORE_PASSWORD: ${{ env.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ env.KEY_ALIAS }}
          KEY_PASSWORD: ${{ env.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    name: 📊 Summary
    runs-on: ubuntu-latest
    needs: [build-release]
    if: always()
    steps:
      - run: |
          echo "## 📱 JH Tone APK Build" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| 🌐 URL | https://jh.auth.jhtone.site/ |" >> $GITHUB_STEP_SUMMARY
          echo "| 📅 Date | $(date '+%Y-%m-%d %H:%M UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| 🌿 Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Download APK from **Artifacts** section above." >> $GITHUB_STEP_SUMMARY
